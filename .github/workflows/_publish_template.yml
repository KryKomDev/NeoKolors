name: Publish Template

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      test_project_path:
        required: true
        type: string
    secrets:
      NUGET_API_KEY:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    
    env:
      NugetOutputDir: ./output/

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: false

    - name: Restore Target Project
      run: dotnet restore ${{ inputs.project_path }}

    - name: Build Target Project
      run: dotnet build ${{ inputs.project_path }} --configuration Release --no-restore

    - name: Restore Test Project
      run: dotnet restore ${{ inputs.test_project_path }}

    - name: Build Test Project
      run: dotnet build ${{ inputs.test_project_path }} --configuration Release --no-restore
  
    - name: Run Tests
      run: dotnet test ${{ inputs.test_project_path }} --configuration Release --no-build

    - name: Pack Target Project
      run: dotnet pack ${{ inputs.project_path }} --configuration Release --no-build --output ${{ env.NugetOutputDir }}

    - name: Push to NuGet
      run: |
        dotnet nuget push "${{ env.NugetOutputDir }}*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      shell: bash
