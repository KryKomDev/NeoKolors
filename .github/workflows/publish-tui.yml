name: Publish NeoKolors.Tui to NuGet

on:   
  workflow_dispatch:

jobs:
  publish:
    uses: ./.github/workflows/_publish_template.yml
    with:
      project_name: Tui
      project_path: Src/Tui/NeoKolors.Tui.csproj
      test_project_path: Src/Tests/Tui.Tests/NeoKolors.Tui.Tests.csproj
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
